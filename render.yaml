services:
  - type: web
    name: kbc-operations-portal
    runtime: node
    plan: starter
    region: ohio
    rootDir: app
    buildCommand: npm ci --include=dev --no-audit --no-fund && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: checksPass
    numInstances: 1
    buildFilter:
      paths:
        - app/**
        - docs/**
        - dist/**
        - source-materials/bylaws/**
        - mkdocs.yml
    envVars:
      - key: NODE_ENV
        value: production
      - key: FINANCIAL_MODE
        value: hybrid
      - key: VITE_FINANCIAL_MODE
        value: hybrid
      - key: SESSION_SECRET
        generateValue: true
      - key: MFA_ENCRYPTION_KEY
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: OPERATIONS_ALERT_EMAILS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: kbc-operations-db
          property: connectionString

databases:
  - name: kbc-operations-db
    databaseName: kbc_operations
    user: kbc_operations
    plan: basic-256mb
    diskSizeGB: 1
    region: ohio
    ipAllowList: []
