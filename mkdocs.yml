site_name: KBC Financial Operations Documentation
site_description: Searchable working documentation for KBC financial operations modernization.
repo_url: https://github.com/coryd3/kbc-financial-operations

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: teal

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:
      base_path: .
      check_paths: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/analytics-config.js
  - assets/javascripts/site-analytics.js
  - assets/javascripts/diagram-viewer.js
  - assets/javascripts/responsive-tables.js

hooks:
  - scripts/mkdocs_hooks.py

nav:
  - Start Here:
      - Home: index.md
      - Leader-Friendly Dashboard: start-here/project-dashboard.md
      - Project Brief: 00-project-brief.md
      - Current State Assessment: 01-current-state-assessment.md
      - Project Dashboard: project-dashboard.md
      - Document Inventory: document-inventory.md
  - Leadership Review:
      - Overview: leadership-review/index.md
      - Leadership Review Packet: communications/leadership-review-packet.md
      - Implementation Roadmap: implementation-roadmap.md
      - Decision Log: 02-decision-log.md
      - Open Questions: 03-open-questions.md
  - Governance and Responsibility:
      - Constitution and Bylaws Reference: governance/constitution-and-bylaws-reference.md
      - Church Organization Chart: governance/church-organization-chart.md
      - Responsibility Matrix: governance/responsibility-matrix.md
      - Finance Committee Charter: governance/finance-committee-charter.md
      - Personnel Committee Role: governance/personnel-committee-role.md
      - Future Governance Expansion: governance/future-governance-expansion.md
  - Roles and Hiring:
      - Treasurer vs. Bookkeeper Duty Split: roles/treasurer-vs-bookkeeper-duty-split.md
      - Treasurer Governance Role: roles/treasurer-governance-role.md
      - Interim Treasurer Role: roles/interim-treasurer-role.md
      - Bookkeeper Job Description: roles/bookkeeper-financial-administrator-job-description.md
      - Bookkeeper Application: roles/bookkeeper-job-application.md
      - Bookkeeper Hiring Process: roles/bookkeeper-hiring-process.md
      - Job Description Consistency Check: roles/job-description-consistency-check.md
  - Finance Operations:
      - Reimbursement Policy: policies/reimbursement-policy.md
      - Reimbursement Process: procedures/reimbursement-process.md
