name: Export Docs

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    name: Export review files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install export tools
        run: |
          sudo apt-get update
          sudo apt-get install -y make pandoc texlive-xetex texlive-latex-recommended texlive-fonts-recommended
          npm install --global @marp-team/marp-cli

      - name: Export documents
        run: make export

      - name: Upload generated exports
        uses: actions/upload-artifact@v4
        with:
          name: kbc-financial-operations-exports
          path: dist/exports/
          if-no-files-found: error
