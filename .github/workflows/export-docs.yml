name: Export Docs

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    name: Export review files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install export tools
        run: |
          sudo apt-get update
          sudo apt-get install -y make pandoc libreoffice-writer fonts-liberation poppler-utils unzip zip perl
          npm install --global @marp-team/marp-cli

      - name: Create release packet
        run: make release

      - name: Upload generated exports
        uses: actions/upload-artifact@v7
        with:
          name: kbc-financial-operations-exports
          path: dist/exports/
          if-no-files-found: error

      - name: Upload release packet
        uses: actions/upload-artifact@v7
        with:
          name: kbc-financial-operations-release
          path: dist/releases/
          if-no-files-found: error
